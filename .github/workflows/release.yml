name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      sign:
        type: boolean
        default: false
        description: "Sign and notarize the macOS build"

permissions:
  contents: write

env:
  SHOULD_SIGN: ${{ startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.sign) }}
  MACOSX_DEPLOYMENT_TARGET: "13.0"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest
            arch: aarch64
          - runner: macos-15-intel
            arch: x86_64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.arch }}-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.arch }}

      - name: Validate Cargo.toml version matches tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          CARGO_VERSION=$(cargo pkgid | sed 's/.*[#@]//')
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [[ "$CARGO_VERSION" != "$TAG_VERSION" ]]; then
            echo "::error::Cargo.toml version ($CARGO_VERSION) != tag ($TAG_VERSION)"
            exit 1
          fi

      - name: Tests
        run: cargo test --release --target ${{ matrix.arch }}-apple-darwin

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.arch }}-apple-darwin

      - name: Bundle .app
        run: scripts/bundle-app.sh
        env:
          CADRAN_BINARY: target/${{ matrix.arch }}-apple-darwin/release/cadran

      - name: Smoke test bundle
        run: |
          plutil -lint target/Cadran.app/Contents/Info.plist
          test -x target/Cadran.app/Contents/MacOS/cadran
          EXPECTED_ARCH=${{ matrix.arch == 'aarch64' && 'arm64' || 'x86_64' }}
          file target/Cadran.app/Contents/MacOS/cadran | grep -q "Mach-O.*$EXPECTED_ARCH"
          test -f target/Cadran.app/Contents/Resources/AppIcon.icns
          plutil -p target/Cadran.app/Contents/Info.plist | grep -q "CFBundleVersion"

      - name: Import Apple Developer Certificate
        if: env.SHOULD_SIGN == 'true'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security import certificate.p12 -k build.keychain \
            -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" build.keychain
          security find-identity -v -p codesigning build.keychain | tee /tmp/codesign-identities.txt
          if ! grep -q "Developer ID Application" /tmp/codesign-identities.txt; then
            echo "::error::no Developer ID Application identity in build.keychain"
            exit 1
          fi
          rm certificate.p12 /tmp/codesign-identities.txt

      - name: Codesign .app
        env:
          APPLE_SIGNING_IDENTITY: ${{ env.SHOULD_SIGN == 'true' && secrets.APPLE_SIGNING_IDENTITY || '' }}
        run: scripts/codesign-app.sh target/Cadran.app

      - name: Notarize and staple
        if: env.SHOULD_SIGN == 'true'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set +x
          set -euo pipefail
          ditto -c -k --keepParent target/Cadran.app notarize.zip
          xcrun notarytool submit notarize.zip \
            --apple-id "$APPLE_ID" --password "$APPLE_PASSWORD" --team-id "$APPLE_TEAM_ID" \
            --wait --timeout 1800 2>&1 | tee notarize_output.txt
          if ! grep -q "status: Accepted" notarize_output.txt; then
            SUBMISSION_ID=$(grep -oE '[0-9a-f-]{36}' notarize_output.txt | head -1)
            if [[ -n "$SUBMISSION_ID" ]]; then
              xcrun notarytool log "$SUBMISSION_ID" \
                --apple-id "$APPLE_ID" --password "$APPLE_PASSWORD" --team-id "$APPLE_TEAM_ID"
            fi
            exit 1
          fi
          xcrun stapler staple target/Cadran.app
          xcrun stapler validate target/Cadran.app
          spctl -a -vvv -t exec target/Cadran.app
          rm notarize.zip

      - name: Package .app as ZIP
        run: ditto -c -k --keepParent target/Cadran.app "Cadran-macos-${{ matrix.arch }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cadran-macos-${{ matrix.arch }}
          path: "Cadran-macos-${{ matrix.arch }}.zip"

      - name: Cleanup keychain
        if: always() && env.SHOULD_SIGN == 'true'
        run: security delete-keychain build.keychain 2>/dev/null || true

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get tag message
        id: tag_message
        run: |
          git fetch --tags --force
          TAG_MSG=$(git tag -l --format='%(contents)' "${GITHUB_REF_NAME}")
          {
            echo "body<<EOF"
            echo "$TAG_MSG"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - uses: actions/download-artifact@v4
        with:
          name: cadran-macos-aarch64
          path: artifacts

      - uses: actions/download-artifact@v4
        with:
          name: cadran-macos-x86_64
          path: artifacts

      - uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.tag_message.outputs.body }}
          files: |
            artifacts/Cadran-macos-aarch64.zip
            artifacts/Cadran-macos-x86_64.zip
