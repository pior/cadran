# DevBuddy config file
# See https://github.com/devbuddy/devbuddy/blob/master/docs/Config.md

env:
  ENV: development

up:
  - rust:
      version: "1.95"

commands:
  run:
    desc: Run the app
    run: cargo run

  build:
    desc: Build the app
    run: cargo build

  test:
    desc: Run all tests
    run: cargo test

  bundle:
    desc: Build the .app bundle
    run: |
      cargo build --release
      scripts/generate-icons.sh
      rm -rf target/Cadran.app
      mkdir -p target/Cadran.app/Contents/MacOS
      mkdir -p target/Cadran.app/Contents/Resources
      cp Info.plist target/Cadran.app/Contents/
      cp target/release/cadran target/Cadran.app/Contents/MacOS/
      cp target/AppIcon.icns target/Cadran.app/Contents/Resources/
      echo "Built target/Cadran.app"

  install:
    desc: Build and install the app to /Applications
    run: |
      bud bundle
      osascript -e 'tell application "Cadran" to quit' 2>/dev/null || true
      rm -rf /Applications/Cadran.app
      cp -R target/Cadran.app /Applications/Cadran.app
      echo "Installed to /Applications/Cadran.app"
      open /Applications/Cadran.app
